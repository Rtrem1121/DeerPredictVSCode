name: Deer Prediction App - Frontend Validation

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  frontend-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create CI env file
        run: |
          cat > .env <<'EOF'
          APP_PASSWORD=ci-password
          CORS_ALLOWED_ORIGINS=http://localhost:8501
          EOF

      - name: Start stack with docker compose
        run: |
          docker compose up --build -d backend frontend redis

      - name: Wait for backend health
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              echo "Backend is healthy"
              exit 0
            fi
            sleep 5
          done
          echo "Backend health check failed"
          docker compose logs backend
          exit 1

      - name: Wait for frontend startup
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:8501 > /dev/null; then
              echo "Frontend is reachable"
              exit 0
            fi
            sleep 5
          done
          echo "Frontend did not start"
          docker compose logs frontend
          exit 1

      - name: Backend smoke tests
        run: |
          curl -fsS http://localhost:8000/health
          curl -fsS http://localhost:8000/config/status

      - name: Cleanup containers
        if: always()
        run: |
          docker compose down -v --remove-orphans
